<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Miru · The Seeing Eye</title>
<style>
  /* ==================================================================
     Miru · visual.html — explainability is a seeing eye.
     The model's gaze made visible.
     ================================================================== */

  :root {
    --bg:       #06060f;
    --bg-soft:  #0c0c1a;
    --ink:      #f4f4ff;
    --ink-dim:  #8b8ba3;
    --ink-faint:#3f3f55;
    --iris:     #7c3aed;
    --iris-hot: #a855f7;
    --iris-rim: #4c1d95;
    --pupil:    #000000;
    --amber:    #f59e0b;
    --vein:     #2a3148;
    --line:     #1c1c2e;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    overflow-x: hidden;
    /* Ambient stars */
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.04), transparent),
      radial-gradient(1.5px 1.5px at 75% 60%, rgba(255,255,255,0.05), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.04), transparent),
      radial-gradient(1.5px 1.5px at 90% 20%, rgba(255,255,255,0.03), transparent),
      radial-gradient(1px 1px at 12% 70%, rgba(255,255,255,0.04), transparent);
  }
  ::selection { background: var(--iris); color: #fff; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
    pointer-events: none;
  }
  .brand {
    font-weight: 700;
    letter-spacing: 0.4em;
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .brand .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--iris);
    margin: 0 8px 1px 0;
    box-shadow: 0 0 12px var(--iris);
  }
  .meta {
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* ==================================================================
     Stage — the centerpiece
     ================================================================== */
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px 40px;
    position: relative;
  }

  .stage-title {
    text-align: center;
    margin-bottom: 36px;
    pointer-events: none;
  }
  .stage-title h1 {
    margin: 0;
    font-size: clamp(28px, 4.5vw, 48px);
    font-weight: 200;
    letter-spacing: -0.02em;
  }
  .stage-title h1 em {
    font-style: normal;
    font-weight: 600;
    background: linear-gradient(135deg, var(--iris-hot), var(--amber));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stage-title p {
    margin: 12px 0 0;
    color: var(--ink-dim);
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  /* ==================================================================
     The eye — pure CSS/SVG, alive.
     ================================================================== */
  .eyes {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    transition: gap 0.8s cubic-bezier(0.6, 0, 0.4, 1);
  }
  .eyes.split { gap: 80px; }

  .eye-wrap {
    position: relative;
    width: 380px;
    height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s, transform 0.8s cubic-bezier(0.6, 0, 0.4, 1);
  }
  .eye-wrap.secondary {
    width: 0;
    opacity: 0;
    overflow: hidden;
    transform: scale(0.6);
    pointer-events: none;
  }
  .eyes.split .eye-wrap.secondary {
    width: 380px;
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .eyes.split .eye-wrap.primary { transform: translateX(0); }

  .eye-label {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .eyes.split .eye-label { opacity: 1; }

  .eye {
    position: relative;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #f0f0fa 0%, #d4d4e8 60%, #888aa0 100%);
    box-shadow:
      inset 0 0 60px rgba(20, 20, 40, 0.35),
      inset 0 0 12px rgba(0, 0, 0, 0.4),
      0 30px 60px rgba(124, 58, 237, 0.15),
      0 0 0 1px rgba(124, 58, 237, 0.2);
    transform: scale(1);
    transition: transform 0.4s ease;
  }
  .eye:hover { transform: scale(1.02); }

  /* Subtle blue-gray sclera veining */
  .eye::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse 80% 40% at 100% 50%, rgba(80, 100, 160, 0.18), transparent 60%),
      radial-gradient(ellipse 50% 30% at 0% 50%,  rgba(80, 100, 160, 0.14), transparent 60%),
      radial-gradient(ellipse 60% 20% at 50% 100%, rgba(120, 50, 80, 0.10), transparent 70%);
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* Iris layer */
  .iris {
    position: absolute;
    top: 50%; left: 50%;
    width: 230px; height: 230px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle at center,
        var(--iris) 0%,
        var(--iris-hot) 30%,
        var(--iris-rim) 70%,
        #1a0a3a 100%);
    box-shadow:
      inset 0 0 30px rgba(0, 0, 0, 0.6),
      0 0 24px rgba(124, 58, 237, 0.5);
    overflow: hidden;
    pointer-events: none;
    transition: filter 0.4s, box-shadow 0.4s;
  }

  /* Iris rotating rings — three independent layers, different speeds */
  .iris::before {
    content: "";
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg,
        transparent 0deg, rgba(255,255,255,0.18) 8deg, transparent 18deg,
        transparent 60deg, rgba(255,255,255,0.12) 70deg, transparent 80deg,
        transparent 130deg, rgba(245, 158, 11, 0.18) 140deg, transparent 150deg,
        transparent 210deg, rgba(255,255,255,0.18) 220deg, transparent 230deg,
        transparent 280deg, rgba(168, 85, 247, 0.22) 290deg, transparent 300deg);
    animation: iris-rotate-slow 28s linear infinite;
    mix-blend-mode: screen;
  }
  .iris::after {
    content: "";
    position: absolute;
    inset: 18%;
    border-radius: 50%;
    background:
      conic-gradient(from 90deg,
        transparent 0deg, rgba(255,255,255,0.10) 12deg, transparent 24deg,
        transparent 90deg, rgba(168, 85, 247, 0.20) 105deg, transparent 120deg,
        transparent 200deg, rgba(255,255,255,0.10) 215deg, transparent 230deg,
        transparent 300deg, rgba(245, 158, 11, 0.12) 315deg, transparent 330deg);
    animation: iris-rotate-fast 16s linear infinite reverse;
    mix-blend-mode: screen;
  }

  /* Pupil — black center where the image lives */
  .pupil {
    position: absolute;
    top: 50%; left: 50%;
    width: 130px; height: 130px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: var(--pupil);
    box-shadow:
      inset 0 0 16px rgba(0, 0, 0, 1),
      0 0 12px rgba(124, 58, 237, 0.4);
    overflow: hidden;
    z-index: 4;
    transition: width 0.5s ease, height 0.5s ease, box-shadow 0.4s;
  }
  .pupil.has-image {
    width: 200px;
    height: 200px;
    box-shadow:
      inset 0 0 8px rgba(0, 0, 0, 0.8),
      0 0 28px rgba(168, 85, 247, 0.7);
  }
  .pupil img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  .pupil.has-image img { opacity: 1; }

  /* Pupil idle pulse — invitation */
  .pupil:not(.has-image)::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--iris-hot);
    opacity: 0;
    animation: pupil-pulse 2.6s ease-out infinite;
    pointer-events: none;
  }

  /* Heatmap overlay — bleeds outward from the pupil */
  .heatmap {
    position: absolute;
    top: 50%; left: 50%;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .heatmap.active { opacity: 0.85; }
  .heatmap img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  /* Specular highlight — reflective sheen */
  .glint {
    position: absolute;
    top: 22%; left: 30%;
    width: 60px; height: 38px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.85), rgba(255,255,255,0) 70%);
    border-radius: 50%;
    transform: rotate(-22deg);
    z-index: 7;
    pointer-events: none;
  }
  .glint-small {
    position: absolute;
    bottom: 30%; right: 28%;
    width: 18px; height: 12px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.7), rgba(255,255,255,0) 70%);
    border-radius: 50%;
    z-index: 7;
    pointer-events: none;
  }

  /* Eyelid — used for the blink animation */
  .lid {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--bg);
    transform: scaleY(0);
    transform-origin: top center;
    z-index: 8;
    pointer-events: none;
  }
  .lid.blink { animation: blink 0.45s ease-in-out; }

  /* Focus rings — numbered top-region indicators */
  .focus-ring {
    position: absolute;
    width: 36px; height: 36px;
    border: 1.5px solid var(--amber);
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.5s cubic-bezier(0.5, 1.6, 0.5, 1);
    box-shadow: 0 0 14px rgba(245, 158, 11, 0.6);
  }
  .focus-ring.show { transform: translate(-50%, -50%) scale(1); }
  .focus-ring .num {
    position: absolute;
    top: -8px; right: -8px;
    width: 16px; height: 16px;
    background: var(--amber);
    color: var(--bg);
    border-radius: 50%;
    font-size: 9px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: ui-monospace, monospace;
  }

  .pulse-rim {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--iris-hot);
    opacity: 0;
    pointer-events: none;
    animation: rim-pulse 5s ease-in-out infinite;
    z-index: 0;
  }

  /* ==================================================================
     Method icons — three glyphs, no text
     ================================================================== */
  .methods {
    margin-top: 56px;
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
  }
  .method {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(124, 58, 237, 0.06);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--ink-faint);
  }
  .method:hover {
    border-color: var(--iris);
    color: var(--ink-dim);
  }
  .method.active {
    border-color: var(--iris-hot);
    color: var(--iris-hot);
    background: rgba(124, 58, 237, 0.12);
    box-shadow: 0 0 24px rgba(168, 85, 247, 0.4);
  }
  .method svg { width: 22px; height: 22px; }

  .method-label {
    margin-top: 18px;
    font-family: ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    text-transform: uppercase;
    text-align: center;
    height: 14px;
  }

  /* ==================================================================
     Toolbar — split toggle + invisible file input
     ================================================================== */
  .toolbar {
    margin-top: 24px;
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: center;
  }
  .ghost-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 9px 18px;
    border-radius: 999px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }
  .ghost-btn:hover {
    border-color: var(--iris-hot);
    color: var(--ink);
  }
  .ghost-btn.active {
    background: rgba(124, 58, 237, 0.12);
    border-color: var(--iris-hot);
    color: var(--ink);
  }
  input[type="file"] { display: none; }

  /* ==================================================================
     Sample iris thumbnails
     ================================================================== */
  .samples {
    margin-top: 44px;
    display: flex;
    gap: 22px;
    justify-content: center;
  }
  .sample {
    width: 56px; height: 56px;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    border: 1.5px solid var(--line);
    background: var(--bg-soft);
    transition: all 0.3s;
    box-shadow: 0 0 0 0 rgba(124, 58, 237, 0);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .sample:hover {
    border-color: var(--iris);
    transform: scale(1.06);
    box-shadow: 0 0 18px rgba(124, 58, 237, 0.4);
  }
  .sample canvas { display: block; width: 100%; height: 100%; }
  .sample-tag {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: ui-monospace, monospace;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* ==================================================================
     Status / answer strip
     ================================================================== */
  .status {
    margin-top: 64px;
    text-align: center;
    min-height: 44px;
    color: var(--ink-dim);
    font-family: ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    transition: color 0.3s;
  }
  .status .answer {
    color: var(--ink);
    font-size: 13px;
  }
  .status .lat {
    color: var(--ink-faint);
    margin-left: 12px;
  }
  .status .err { color: var(--amber); }

  /* ==================================================================
     Animations
     ================================================================== */
  @keyframes iris-rotate-slow {
    to { transform: rotate(360deg); }
  }
  @keyframes iris-rotate-fast {
    to { transform: rotate(360deg); }
  }
  @keyframes pupil-pulse {
    0%   { transform: scale(0.85); opacity: 0.0; }
    40%  { opacity: 0.6; }
    100% { transform: scale(1.6);  opacity: 0; }
  }
  @keyframes rim-pulse {
    0%, 100% { opacity: 0.0; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(1.04); }
  }
  @keyframes blink {
    0%   { transform: scaleY(0); }
    40%  { transform: scaleY(1); }
    60%  { transform: scaleY(1); }
    100% { transform: scaleY(0); }
  }
  @keyframes idle-iris-breath {
    0%, 100% { filter: brightness(1.0)   saturate(1.0); }
    50%      { filter: brightness(1.15)  saturate(1.15); }
  }
  .iris { animation: idle-iris-breath 4.5s ease-in-out infinite; }

  @media (max-width: 760px) {
    .eye-wrap, .eye-wrap.secondary { width: 280px; height: 280px; }
    .eyes.split .eye-wrap.secondary { width: 280px; height: 280px; }
    .eye { width: 260px; height: 260px; }
    .iris { width: 170px; height: 170px; }
    .pupil { width: 96px; height: 96px; }
    .pupil.has-image { width: 150px; height: 150px; }
    .heatmap { width: 150px; height: 150px; }
    .eyes { gap: 30px; }
    .eyes.split { gap: 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span>MIRU · 見る</div>
  <div class="meta" id="server-meta">connecting…</div>
</header>

<main class="stage">
  <div class="stage-title">
    <h1>The model has <em>eyes</em>.</h1>
    <p>Drop an image into the pupil. Watch where it looks.</p>
  </div>

  <!-- The eye(s) -->
  <div class="eyes" id="eyes">
    <div class="eye-wrap primary">
      <div class="pulse-rim"></div>
      <div class="eye" id="eye-a" data-side="a">
        <div class="iris"></div>
        <div class="pupil" id="pupil-a">
          <img alt="" id="img-a" />
        </div>
        <div class="heatmap" id="heatmap-a"><img alt="" id="overlay-a" /></div>
        <div class="glint"></div>
        <div class="glint-small"></div>
        <div class="lid" id="lid-a"></div>
      </div>
      <div class="eye-label" id="label-a">attention</div>
    </div>

    <div class="eye-wrap secondary">
      <div class="pulse-rim"></div>
      <div class="eye" id="eye-b" data-side="b">
        <div class="iris"></div>
        <div class="pupil" id="pupil-b">
          <img alt="" id="img-b" />
        </div>
        <div class="heatmap" id="heatmap-b"><img alt="" id="overlay-b" /></div>
        <div class="glint"></div>
        <div class="glint-small"></div>
        <div class="lid" id="lid-b"></div>
      </div>
      <div class="eye-label" id="label-b">gradcam</div>
    </div>
  </div>

  <!-- Method selector — three icons, no text -->
  <div class="methods" id="methods">
    <!-- gradcam: gradient symbol -->
    <div class="method" data-method="gradcam" title="gradcam · occlusion sensitivity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="currentColor" stop-opacity="1"/>
            <stop offset="100%" stop-color="currentColor" stop-opacity="0.25"/>
          </linearGradient>
        </defs>
        <rect x="3" y="3" width="18" height="18" rx="3" fill="url(#g1)" stroke="currentColor"/>
      </svg>
    </div>
    <!-- lime: mosaic symbol -->
    <div class="method" data-method="lime" title="lime · superpixel perturbation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
        <rect x="3" y="3" width="6" height="6" rx="1"/>
        <rect x="11" y="3" width="4" height="6" rx="1" fill="currentColor" fill-opacity="0.2"/>
        <rect x="17" y="3" width="4" height="4" rx="1"/>
        <rect x="3" y="11" width="4" height="4" rx="1" fill="currentColor" fill-opacity="0.4"/>
        <rect x="9" y="11" width="6" height="6" rx="1"/>
        <rect x="17" y="9" width="4" height="6" rx="1" fill="currentColor" fill-opacity="0.2"/>
        <rect x="3" y="17" width="6" height="4" rx="1"/>
        <rect x="11" y="19" width="4" height="2" rx="1" fill="currentColor" fill-opacity="0.4"/>
        <rect x="17" y="17" width="4" height="4" rx="1"/>
      </svg>
    </div>
    <!-- attention: waveform symbol -->
    <div class="method active" data-method="attention" title="attention · raw extraction">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12 L5 12 L7 6 L9 18 L11 9 L13 15 L15 4 L17 20 L19 12 L22 12"/>
      </svg>
    </div>
  </div>
  <div class="method-label" id="method-label">attention</div>

  <div class="toolbar">
    <label class="ghost-btn" for="file">upload image</label>
    <input type="file" id="file" accept="image/*" />
    <button class="ghost-btn" id="split-btn">split view</button>
  </div>

  <!-- Sample iris thumbnails -->
  <div class="samples" id="samples"></div>

  <div class="status" id="status">awaiting an image…</div>
</main>

<script>
  // ====================================================================
  // Config
  // ====================================================================
  const API = (location.protocol === "file:" ? "http://localhost:8000" : location.origin);
  const DEFAULT_QUESTION = "Where is the salient region?";

  let activeMethod = "attention";
  let splitMode = false;
  let currentImageB64 = null;

  // ====================================================================
  // DOM refs
  // ====================================================================
  const $ = id => document.getElementById(id);
  const status = $("status");
  const eyes = $("eyes");
  const splitBtn = $("split-btn");
  const fileInput = $("file");
  const methodsEl = $("methods");
  const methodLabel = $("method-label");
  const labelA = $("label-a");
  const labelB = $("label-b");
  const serverMeta = $("server-meta");

  // ====================================================================
  // Boot — health probe + blink + sample generation
  // ====================================================================
  window.addEventListener("DOMContentLoaded", async () => {
    blink("a");
    setTimeout(() => blink("b"), 100);
    buildSamples();
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        const j = await r.json();
        serverMeta.textContent = `miru ${j.version} · ${j.backends.join(",")}`;
      } else {
        serverMeta.innerHTML = `<span class="err">server unreachable</span>`;
      }
    } catch {
      serverMeta.innerHTML = `<span class="err">offline · start uvicorn api.main:app</span>`;
    }
  });

  // ====================================================================
  // Method selector
  // ====================================================================
  methodsEl.addEventListener("click", e => {
    const tile = e.target.closest(".method");
    if (!tile) return;
    [...methodsEl.children].forEach(c => c.classList.remove("active"));
    tile.classList.add("active");
    activeMethod = tile.dataset.method;
    methodLabel.textContent = activeMethod;
    if (currentImageB64) run();
  });

  // ====================================================================
  // Split toggle — second eye opens; method becomes the comparison pair.
  // ====================================================================
  splitBtn.addEventListener("click", () => {
    splitMode = !splitMode;
    eyes.classList.toggle("split", splitMode);
    splitBtn.classList.toggle("active", splitMode);
    if (splitMode) {
      labelA.textContent = "attention";
      labelB.textContent = activeMethod === "attention" ? "gradcam" : activeMethod;
      methodLabel.textContent = `${labelA.textContent}  ⟷  ${labelB.textContent}`;
    } else {
      methodLabel.textContent = activeMethod;
    }
    if (currentImageB64) run();
  });

  // ====================================================================
  // File upload
  // ====================================================================
  fileInput.addEventListener("change", async e => {
    const f = e.target.files[0];
    if (!f) return;
    const dataURL = await fileToDataURL(f);
    loadImage(dataURL);
  });

  // Drag-and-drop on eye
  ["dragover", "dragenter"].forEach(ev =>
    document.body.addEventListener(ev, e => { e.preventDefault(); }));
  document.body.addEventListener("drop", async e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const dataURL = await fileToDataURL(f);
    loadImage(dataURL);
  });

  function fileToDataURL(f) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(f);
    });
  }

  // ====================================================================
  // Sample images — three procedurally-generated 64x64 images
  // ====================================================================
  function buildSamples() {
    const samples = $("samples");
    const recipes = [
      { tag: "single",  fn: drawSingle },
      { tag: "two",     fn: drawTwo },
      { tag: "stripes", fn: drawStripes },
    ];
    recipes.forEach(({ tag, fn }) => {
      const wrap = document.createElement("div");
      wrap.className = "sample";
      wrap.title = `sample · ${tag}`;
      const canvas = document.createElement("canvas");
      canvas.width = 64; canvas.height = 64;
      fn(canvas);
      wrap.appendChild(canvas);
      const tagEl = document.createElement("div");
      tagEl.className = "sample-tag";
      tagEl.textContent = tag;
      wrap.appendChild(tagEl);
      wrap.addEventListener("click", () => loadImage(canvas.toDataURL("image/png")));
      samples.appendChild(wrap);
    });
  }
  function drawSingle(c) {
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#171a2e"; ctx.fillRect(0, 0, 64, 64);
    const grad = ctx.createRadialGradient(40, 22, 2, 40, 22, 16);
    grad.addColorStop(0, "#f5d27c");
    grad.addColorStop(1, "rgba(245,210,124,0)");
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
  }
  function drawTwo(c) {
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#1a132e"; ctx.fillRect(0, 0, 64, 64);
    [[18, 18, "#a855f7"], [46, 44, "#f59e0b"]].forEach(([x, y, col]) => {
      const g = ctx.createRadialGradient(x, y, 1, x, y, 14);
      g.addColorStop(0, col);
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g; ctx.fillRect(0, 0, 64, 64);
    });
  }
  function drawStripes(c) {
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#0c1322"; ctx.fillRect(0, 0, 64, 64);
    for (let x = 0; x < 64; x += 6) {
      ctx.fillStyle = `rgba(168, 85, 247, ${0.15 + 0.45 * Math.sin(x / 4)})`;
      ctx.fillRect(x, 0, 3, 64);
    }
  }

  // ====================================================================
  // Image load → place into pupil → run
  // ====================================================================
  function loadImage(dataURL) {
    currentImageB64 = dataURL.split(",")[1];
    $("img-a").src = dataURL;
    $("img-b").src = dataURL;
    $("pupil-a").classList.add("has-image");
    $("pupil-b").classList.add("has-image");
    blink("a");
    if (splitMode) blink("b");
    run();
  }

  // ====================================================================
  // Inference
  // ====================================================================
  async function run() {
    if (!currentImageB64) return;
    clearFocusRings();
    setStatus(splitMode ? `comparing ${labelA.textContent} ⟷ ${labelB.textContent}…`
                        : `focusing · ${activeMethod}…`);
    try {
      if (splitMode) {
        await runCompare();
      } else {
        await runSingle();
      }
    } catch (err) {
      setStatus(`<span class="err">${err.message}</span>`);
      console.error(err);
    }
  }

  async function runSingle() {
    const t0 = performance.now();
    const r = await fetch(`${API}/explain`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        image_b64: currentImageB64,
        model_name: "mock",
        method: activeMethod,
        question: DEFAULT_QUESTION,
        top_k: 3,
        n_samples: 32,
        n_segments: 16,
        occlusion_grid: 5,
      }),
    });
    if (!r.ok) throw new Error(await safeError(r));
    const j = await r.json();
    paintHeatmap("a", j.overlay_b64);
    drawFocusRings("a", j.top_regions, j.attention_grid.length);
    const dt = (performance.now() - t0).toFixed(0);
    setStatus(`<span class="answer">${escapeHTML(j.answer)}</span><span class="lat">· ${dt}ms · ${j.method}</span>`);
  }

  async function runCompare() {
    const t0 = performance.now();
    const method_b = labelB.textContent;
    const r = await fetch(`${API}/explain/compare`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        image_b64: currentImageB64,
        model_name: "mock",
        method_a: "attention",
        method_b: method_b,
        question: DEFAULT_QUESTION,
        top_k: 3,
        n_samples: 24,
        n_segments: 16,
        occlusion_grid: 4,
      }),
    });
    if (!r.ok) throw new Error(await safeError(r));
    const j = await r.json();
    paintHeatmap("a", j.a_overlay_b64);
    paintHeatmap("b", j.b_overlay_b64);
    drawFocusRings("a", j.a_top_regions, j.a_attention_grid.length);
    drawFocusRings("b", j.b_top_regions, j.b_attention_grid.length);
    const dt = (performance.now() - t0).toFixed(0);
    setStatus(`<span class="answer">${escapeHTML(j.answer)}</span><span class="lat">· ${dt}ms · ${j.method_a} ⟷ ${j.method_b}</span>`);
  }

  async function safeError(r) {
    try {
      const j = await r.json();
      return j.detail || `${r.status}`;
    } catch {
      return `${r.status}`;
    }
  }

  // ====================================================================
  // Visual primitives
  // ====================================================================
  function paintHeatmap(side, b64) {
    const overlay = $(`overlay-${side}`);
    overlay.src = `data:image/png;base64,${b64}`;
    overlay.onload = () => $(`heatmap-${side}`).classList.add("active");
  }

  function drawFocusRings(side, regions, gridSize) {
    const eye = $(`eye-${side}`);
    const pupil = $(`pupil-${side}`);
    // Pupil center & size relative to eye for ring placement.
    const eyeRect = eye.getBoundingClientRect();
    const pupilRect = pupil.getBoundingClientRect();
    const cx = (pupilRect.left + pupilRect.width / 2) - eyeRect.left;
    const cy = (pupilRect.top + pupilRect.height / 2) - eyeRect.top;
    const r0 = pupilRect.width / 2;

    regions.forEach((reg, idx) => {
      const ring = document.createElement("div");
      ring.className = "focus-ring";
      const x = (reg.col + 0.5) / gridSize - 0.5;  // [-0.5, 0.5]
      const y = (reg.row + 0.5) / gridSize - 0.5;
      ring.style.left = `${cx + x * r0 * 1.6}px`;
      ring.style.top  = `${cy + y * r0 * 1.6}px`;
      ring.innerHTML = `<div class="num">${idx + 1}</div>`;
      eye.appendChild(ring);
      requestAnimationFrame(() => ring.classList.add("show"));
    });
  }

  function clearFocusRings() {
    document.querySelectorAll(".focus-ring").forEach(r => r.remove());
    document.querySelectorAll(".heatmap").forEach(h => h.classList.remove("active"));
  }

  function blink(side) {
    const lid = $(`lid-${side}`);
    lid.classList.remove("blink");
    void lid.offsetWidth;
    lid.classList.add("blink");
  }

  function setStatus(html) {
    status.innerHTML = html;
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[ch]));
  }
</script>

</body>
</html>
